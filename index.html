<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Scale & Chord Finder</title>
    <!-- Tone.js for Audio Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Tonal.js for Music Theory Math -->
    <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
    <style>
        :root {
            --bg: #1e1e24;
            --surface: #2b2b36;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --key-white: #ffffff;
            --key-black: #111827;
            --key-selected: #3b82f6;
            --key-active: #ef4444;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button,
        select {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid #4b5563;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        button:hover,
        select:hover {
            background-color: #374151;
        }

        button.primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        button.primary:hover {
            background-color: var(--primary-hover);
        }

        .keyboard-wrapper {
            width: 100%;
            max-width: 1400px;
            /* Increased from 1200px to give it more room */
            overflow-x: auto;
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 0 auto 30px auto;
            /* Centers the wrapper itself */
            position: relative;
        }

        .keyboard-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .keyboard {
            display: flex;
            position: relative;
            height: 200px;
            user-select: none;
            min-width: max-content;
            margin: 0 auto;
            /* Centers the keyboard inside the wrapper */
            justify-content: center;
            /* Ensures keys cluster in the middle */
        }

        .key {
            border: 1px solid #ccc;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-weight: bold;
            font-size: 12px;
            transition: background-color 0.1s;
        }

        .key.white {
            width: 44px;
            background: var(--key-white);
            color: var(--key-black);
            z-index: 1;
        }

        .key.black {
            width: 28px;
            height: 125px;
            background: var(--key-black);
            color: var(--text);
            z-index: 2;
            margin-left: -14px;
            margin-right: -14px;
            position: relative;
        }

        .key.selected {
            background-color: var(--key-selected) !important;
            color: white;
        }

        .key.active {
            background-color: var(--key-active) !important;
            color: white;
        }

        .results-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .results-column {
            flex: 1;
            min-width: 300px;
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .results-column h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.2rem;
            border-bottom: 1px solid #4b5563;
            padding-bottom: 10px;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #374151;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .result-notes {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 1rem;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 30, 36, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <h2>Loading Piano Samples...</h2>
        <p>If this takes too long, we'll fall back to synthesizers.</p>
    </div>

    <div class="header">
        <h1>🎹 Piano Scale/Chord Finder</h1>
        <div class="controls">
            <select id="midi-select">
                <option value="">No MIDI Device Connected</option>
            </select>
            <button class="primary" onclick="resetSelection()">Reset Selection</button>
        </div>
    </div>

    <div class="keyboard-wrapper">
        <div class="keyboard-controls">
            <button onclick="shiftOctave(-1)">Octave Down (-)</button>
            <span id="octave-display" style="line-height: 35px;">Octaves 2-5</span>
            <button onclick="shiftOctave(1)">Octave Up (+)</button>
        </div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <div class="results-container">
        <div class="results-column" id="scales-col">
            <h2>Matching Scales</h2>
            <div id="scales-list">Select notes to find scales...</div>
        </div>
        <div class="results-column" id="chords-col">
            <h2>Matching Chords</h2>
            <div id="chords-list">Select notes to find chords...</div>
        </div>
    </div>

    <script>
        // --- STATE & CONFIG ---
        let audioContextStarted = false;
        let selectedNotes = new Set(); // Stores specific notes e.g., "C4"
        let baseOctave = 2; // Keyboard starts at C2
        let numKeys = 49; // 4 octaves

        // Tonal.js theory dictionaries
        const CHROMATIC_SCALE = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];

        // Weights for sorting logic based on prompt rules
        const scaleWeights = {
            "major": 1, "minor": 1,
            "dorian": 2, "phrygian": 2, "lydian": 2, "mixolydian": 2, "locrian": 2,
            "major pentatonic": 3, "minor pentatonic": 3
        };

        const chordWeights = {
            "M": 1, "m": 1, "dim": 1, "aug": 1,
            "maj7": 2, "m7": 2, "7": 2, "m7b5": 2, "dim7": 2,
            "sus2": 3, "sus4": 3, "add9": 3,
            "9": 4, "m9": 4, "maj9": 4
        };

        // --- AUDIO SETUP ---
        let sampler;
        let synthFallback;

        function initAudio() {
            synthFallback = new Tone.PolySynth(Tone.Synth).toDestination();
            synthFallback.volume.value = -8;

            sampler = new Tone.Sampler({
                urls: {
                    "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3",
                    "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3",
                    "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3",
                    "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3",
                    "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3",
                    "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3", "A6": "A6.mp3",
                    "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3", "A7": "A7.mp3"
                },
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => {
                    document.getElementById('loading-overlay').style.display = 'none';
                },
                onerror: () => {
                    console.warn("Piano samples failed to load. Falling back to oscillator synth.");
                    sampler = synthFallback;
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            }).toDestination();

            // Safety timeout for overlay removal
            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 6000);
        }

        async function ensureAudio() {
            if (!audioContextStarted) {
                await Tone.start();
                audioContextStarted = true;
            }
        }

        function playNote(noteName) {
            ensureAudio();
            if (sampler.loaded || sampler === synthFallback) {
                sampler.triggerAttackRelease(noteName, "2n");
            }
        }

        // --- KEYBOARD RENDERING ---
        function isBlackKey(noteName) {
            return noteName.includes('#') || noteName.includes('b');
        }

        function renderKeyboard() {
            const keyboardEl = document.getElementById('keyboard');
            keyboardEl.innerHTML = '';

            let startMidi = 12 + (baseOctave * 12); // Midi number for C of baseOctave
            document.getElementById('octave-display').innerText = `Octaves ${baseOctave}-${baseOctave + Math.floor(numKeys / 12)}`;

            for (let i = 0; i < numKeys; i++) {
                let noteMidi = startMidi + i;
                let noteName = Tonal.Note.fromMidi(noteMidi);

                let keyBtn = document.createElement('div');
                keyBtn.className = `key ${isBlackKey(noteName) ? 'black' : 'white'}`;
                keyBtn.dataset.note = noteName;
                keyBtn.id = `key-${noteName}`;

                // Name label span
                let labelSpan = document.createElement('span');
                labelSpan.className = "key-label";
                // Only show labels on selected notes or C notes initially to prevent clutter
                labelSpan.innerText = selectedNotes.has(noteName) ? noteName.replace(/(\d+)/, '') : (noteName.startsWith('C') && !noteName.includes('#') ? noteName : '');
                keyBtn.appendChild(labelSpan);

                if (selectedNotes.has(noteName)) {
                    keyBtn.classList.add('selected');
                }

                keyBtn.addEventListener('mousedown', () => {
                    triggerNote(noteName, true);
                    keyBtn.classList.add('active');
                });

                keyBtn.addEventListener('mouseup', () => keyBtn.classList.remove('active'));
                keyBtn.addEventListener('mouseleave', () => keyBtn.classList.remove('active'));

                keyboardEl.appendChild(keyBtn);
            }
        }

        function shiftOctave(dir) {
            let newOctave = baseOctave + dir;
            if (newOctave >= 0 && newOctave <= 6) {
                baseOctave = newOctave;
                renderKeyboard();
            }
        }

        // --- INTERACTION & LOGIC ---
        function triggerNote(noteName, fromUI = false) {
            playNote(noteName);

            // Add to selection pool
            selectedNotes.add(noteName);

            // Update Visuals
            const keyEl = document.getElementById(`key-${noteName}`);
            if (keyEl) {
                keyEl.classList.add('selected');
                keyEl.querySelector('.key-label').innerText = noteName.replace(/(\d+)/, ''); // Remove octave number for cleaner look
            }

            updateResults();
        }

        function resetSelection() {
            selectedNotes.clear();
            renderKeyboard();
            document.getElementById('scales-list').innerHTML = "Select notes to find scales...";
            document.getElementById('chords-list').innerHTML = "Select notes to find chords...";
        }

        // --- THEORY CALCULATION (TONAL.JS) ---
        function getSelectedPitchClasses() {
            // Convert to chromas (0-11) to avoid enharmonic spelling issues (e.g. D# vs Eb)
            let chromas = new Set();
            selectedNotes.forEach(n => chromas.add(Tonal.Note.chroma(n)));
            return Array.from(chromas);
        }

        function isSubset(subsetChromas, supersetNotes) {
            if (subsetChromas.length === 0) return false;
            const superChromas = supersetNotes.map(n => Tonal.Note.chroma(n));
            return subsetChromas.every(c => superChromas.includes(c));
        }

        function updateResults() {
            const chromas = getSelectedPitchClasses();
            if (chromas.length === 0) {
                resetSelection();
                return;
            }

            let matchedScales = [];
            let matchedChords = [];

            // Check all root notes
            for (let root of CHROMATIC_SCALE) {
                // Check Scales
                for (let scaleType of Object.keys(scaleWeights)) {
                    let scale = Tonal.Scale.get(`${root} ${scaleType}`);
                    if (scale.empty) continue;
                    if (isSubset(chromas, scale.notes)) {
                        matchedScales.push({
                            name: `${root} ${scaleType}`,
                            notes: scale.notes.join(' '),
                            weight: scaleWeights[scaleType],
                            length: scale.notes.length
                        });
                    }
                }

                // Check Chords
                for (let chordType of Object.keys(chordWeights)) {
                    let chord = Tonal.Chord.get(`${root}${chordType}`);
                    if (chord.empty) continue;
                    if (isSubset(chromas, chord.notes)) {
                        matchedChords.push({
                            name: `${root}${chordType}`,
                            notes: chord.notes.join(' '),
                            weight: chordWeights[chordType],
                            length: chord.notes.length
                        });
                    }
                }
            }

            // Sorting Logic
            // Scales: by Weight (Major > Modes > Pentatonics), then number of notes, then alphabetical
            matchedScales.sort((a, b) => {
                if (a.weight !== b.weight) return a.weight - b.weight;
                if (a.length !== b.length) return a.length - b.length;
                return a.name.localeCompare(b.name);
            });

            // Chords: by Weight (Triads > 7ths > sus/add > 9ths), then number of notes, then alphabetical
            matchedChords.sort((a, b) => {
                if (a.weight !== b.weight) return a.weight - b.weight;
                if (a.length !== b.length) return a.length - b.length;
                return a.name.localeCompare(b.name);
            });

            renderResults(matchedScales.slice(0, 10), matchedChords.slice(0, 10));
        }

        function renderResults(scales, chords) {
            const scaleContainer = document.getElementById('scales-list');
            const chordContainer = document.getElementById('chords-list');

            if (scales.length === 0) {
                scaleContainer.innerHTML = "<em>No common scales found matching these notes.</em>";
            } else {
                scaleContainer.innerHTML = scales.map(s => `
                <div class="result-item">
                    <div class="result-name">${s.name.charAt(0).toUpperCase() + s.name.slice(1)}</div>
                    <div class="result-notes">${s.notes}</div>
                </div>
            `).join('');
            }

            if (chords.length === 0) {
                chordContainer.innerHTML = "<em>No common chords found matching these notes.</em>";
            } else {
                chordContainer.innerHTML = chords.map(c => `
                <div class="result-item">
                    <div class="result-name">${c.name}</div>
                    <div class="result-notes">${c.notes}</div>
                </div>
            `).join('');
            }
        }

        // --- MIDI INTEGRATION ---
        let midiAccess = null;
        let activeMidiInput = null;

        function onMIDISuccess(access) {
            midiAccess = access;
            populateMIDIDropdown();

            // Simply re-populate the whole list if devices are plugged/unplugged
            midiAccess.onstatechange = (e) => {
                populateMIDIDropdown();
            };
        }

        function populateMIDIDropdown() {
            const selectBox = document.getElementById('midi-select');
            const currentSelection = selectBox.value; // Remember what was selected

            selectBox.innerHTML = '<option value="">Select MIDI Device</option>';
            let hasDevices = false;

            // Use a robust iterator for the MIDI map
            for (let input of midiAccess.inputs.values()) {
                hasDevices = true;
                let option = document.createElement('option');
                option.value = input.id;
                option.text = input.name || `Unknown MIDI Device`;
                selectBox.appendChild(option);
            }

            if (!hasDevices) {
                selectBox.options[0].text = "No MIDI Devices Found";
            } else {
                // Try to keep the previous selection, otherwise auto-select the first one
                if (currentSelection && midiAccess.inputs.has(currentSelection)) {
                    selectBox.value = currentSelection;
                } else {
                    const firstInput = midiAccess.inputs.values().next().value;
                    selectBox.value = firstInput.id;
                    selectMidiInput(firstInput.id);
                }
            }
        }

        function selectMidiInput(inputId) {
            if (activeMidiInput) activeMidiInput.onmidimessage = null; // Clear old listener
            if (!inputId) return;

            activeMidiInput = midiAccess.inputs.get(inputId);
            if (activeMidiInput) {
                activeMidiInput.onmidimessage = getMIDIMessage;
                console.log(`Connected to: ${activeMidiInput.name}`);
            }
        }

        function handleMidiStateChange(e) {
            // Re-populate list if devices change
            if (e.port.type === "input") {
                const selectBox = document.getElementById('midi-select');
                let exists = Array.from(selectBox.options).some(opt => opt.value === e.port.id);

                if (e.port.state === "connected" && !exists) {
                    let option = document.createElement('option');
                    option.value = e.port.id;
                    option.text = e.port.name;
                    selectBox.appendChild(option);
                    if (!activeMidiInput) {
                        selectBox.value = e.port.id;
                        selectMidiInput(e.port.id);
                    }
                } else if (e.port.state === "disconnected" && exists) {
                    Array.from(selectBox.options).forEach(opt => {
                        if (opt.value === e.port.id) opt.remove();
                    });
                }
            }
        }

        function onMIDIFailure() {
            console.warn("Could not access your MIDI devices.");
            document.getElementById('midi-select').innerHTML = '<option value="">MIDI Not Supported/Allowed</option>';
        }

        function getMIDIMessage(message) {
            let command = message.data[0];
            let note = message.data[1];
            let velocity = (message.data.length > 2) ? message.data[2] : 0;

            // Note On
            if (command >= 144 && command <= 159 && velocity > 0) {
                let noteName = Tonal.Note.fromMidi(note);
                // Visual active state handling
                const keyEl = document.getElementById(`key-${noteName}`);
                if (keyEl) keyEl.classList.add('active');

                triggerNote(noteName);
            }

            // Note Off
            if (command >= 128 && command <= 143 || (command >= 144 && command <= 159 && velocity === 0)) {
                let noteName = Tonal.Note.fromMidi(note);
                const keyEl = document.getElementById(`key-${noteName}`);
                if (keyEl) keyEl.classList.remove('active');
            }
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            initAudio();
            renderKeyboard();
            if (navigator.requestMIDIAccess) {
                navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
            } else {
                document.getElementById('midi-select').innerHTML = '<option value="">Web MIDI API not supported</option>';
            }
        };

    </script>
</body>

</html>
